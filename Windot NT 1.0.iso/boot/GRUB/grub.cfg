set timeout=5
set default=0

# Set the classic visual layout colors (White text on a black background)
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Tylersoft Windot NT 1.0 (x64 Flagship)" {
    multiboot2 /boot/windot_kernel.bin
    boot
}

menuentry "Tylersoft Windot NT 1.0 (Safe Mode)" {
    multiboot2 /boot/windot_kernel.bin sdm=safe
    boot
}
